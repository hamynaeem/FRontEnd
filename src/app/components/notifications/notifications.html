<section class="notifications container">
  <div class="notif-head">
    <h2>Notifications</h2>
    <div class="actions">
      <button class="btn secondary" (click)="clearAll()">Clear All</button>
      <a routerLink="/orders" class="btn">All Orders</a>
    </div>
  </div>

  <div *ngIf="notifications.length === 0" class="empty">No notifications</div>

  <ul class="notif-list" *ngIf="notifications.length">
    <li *ngFor="let n of notifications" class="notif-item">
      <div class="msg">
        <div class="text">{{ n.message }}</div>
        <div class="time">{{ n.time }}</div>
      </div>
      <div class="actions">
        <button class="link" (click)="openOrder(n.id)">View</button>
      </div>
    </li>
  </ul>
</section>
